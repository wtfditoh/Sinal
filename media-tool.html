<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SINAL Studio</title>

<link rel="stylesheet" href="media-tool.css">

</head>


<body>


<div class="app">


<!-- CABEÇALHO -->

<header class="header">


<div class="brand">

<div class="brand-mark"></div>


<div>

<h1>SINAL Studio</h1>

<p>Gerenciador interno da mídia</p>

</div>


</div>



<div class="online">

<span></span>

ONLINE

</div>


</header>





<!-- CARD PRINCIPAL -->

<section class="card">


<div class="title">

UPLOAD DE IMAGEM

</div>




<label class="upload-area" for="file">



<input 
type="file"
id="file"
accept="image/*"
>



<!-- ESTADO VAZIO -->

<div id="emptyState">


<div class="upload-icon">

↑

</div>


<h2>

Enviar imagem

</h2>


<p>

Clique ou arraste uma imagem

</p>


</div>






<!-- PREVIEW -->

<div id="previewBox" class="hidden">


<img id="preview">



<div class="file-info">


<span id="fileName">

imagem.png

</span>



<button 
id="remove"
type="button">

✕

</button>



</div>


</div>



</label>







<div class="divider"><span>OU</span></div>

<div class="url-box">
<label>Link de imagem (Drive, Canva, etc.)</label>
<input
type="url"
id="urlInput"
placeholder="Cole o link aqui"
>
<button
id="uploadUrlBtn"
type="button">
🔗 GERAR A PARTIR DO LINK
</button>
<p id="urlHint">Se o site de origem bloquear, baixa a imagem e usa o upload de arquivo acima.</p>
</div>

<!-- RENOMEAR -->


<div class="rename-box">


<label>

Nome personalizado

</label>


<input 
id="renameInput"
type="text"
placeholder="ex: cartaz-retiro-2026"
>


<p>

Opcional. Se vazio mantém o nome original.

</p>


</div>








<!-- STATUS -->


<div class="status-box">


<span id="statusDot"></span>


<span id="status">

Aguardando imagem

</span>


</div>







<!-- BARRA -->


<div class="progress hidden">


<div id="progressBar"></div>


</div>






<!-- BOTÃO -->


<button 
id="upload"
type="button">

⚡ GERAR LINK DIRETO

</button>





</section>







<!-- RESULTADO -->


<section 
class="card hidden"
id="resultCard">



<div class="title">

LINK GERADO ✓

</div>





<div class="link-box">


<span id="url">

</span>



<button 
id="copy"
type="button">

📋 COPIAR LINK

</button>



</div>




</section>





</div>





<script src="media-tool.js"></script>


</body>


</html>
