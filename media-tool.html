<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SINAL Studio</title>

<link rel="stylesheet" href="media-tool.css">

</head>

<body>

<div class="app">

<header class="header">

<div class="brand">

<div class="brand-mark"></div>

<div>
<h1>SINAL Studio</h1>
<p>Gerenciador interno da mídia</p>
</div>

</div>


<div class="online">
<span></span>
ONLINE
</div>


</header>



<section class="card">


<div class="title">
UPLOAD DE IMAGEM
</div>



<label class="upload-area" id="dropArea">


<input 
type="file" 
id="file" 
accept="image/*"
>



<div id="emptyState">

<div class="upload-icon">
↑
</div>

<h2>Enviar imagem</h2>

<p>
Clique ou arraste um arquivo
</p>

</div>



<div id="previewBox" class="hidden">


<img id="preview">


<div class="file-info">

<span id="fileName">
imagem.png
</span>


<button id="remove">
✕
</button>

</div>


</div>


</label>




<div class="status-box">

<span id="statusDot"></span>

<span id="status">
Aguardando imagem
</span>

</div>



<div class="progress hidden">

<div id="progressBar"></div>

</div>



<button id="upload">

⚡ GERAR LINK DIRETO

</button>



</section>





<section class="card hidden" id="resultCard">


<div class="title">
LINK GERADO ✓
</div>



<div class="link-box">

<span id="url"></span>


<button id="copy">
📋 COPIAR LINK
</button>


</div>


</section>



</div>


<script src="media-tool.js"></script>

</body>

</html>
