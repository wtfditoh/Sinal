<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SINAL</title>

<link rel="stylesheet" href="media-tool.css">

</head>

<body>

<div class="app">

<header class="top">

<div class="brand">

<div class="brand-mark">
</div>

<div>
<h1>SINAL</h1>
<p>Gerenciador interno da mídia</p>
</div>

</div>

<div class="status">
<span></span>
ONLINE
</div>

</header>



<section class="card upload-card">


<div class="section-title">
UPLOAD DE IMAGEM
</div>


<label class="drop">

<input type="file" id="file" accept="image/*">


<div class="drop-content">

<div class="upload-icon">
↑
</div>

<h2>Enviar arquivo</h2>

<p>
Arraste ou clique para selecionar
</p>

</div>


</label>



<div id="preview"></div>



<button id="upload">

GERAR LINK

</button>


</section>





<section class="card result hidden">


<div class="section-title">
LINK DIRETO
</div>


<div class="link-box">

<span id="url"></span>


<button id="copy">
COPIAR
</button>


</div>


</section>



</div>


<script src="media-tool.js"></script>

</body>
</html>
